# Netlify configuration for The Last Signal (Vite + React frontend).
# Set VITE_API_URL in the Netlify dashboard (Site settings → Environment variables)
# to your Render backend URL, e.g. https://the-last-signal-api.onrender.com/api

[build]
 command = "rm -rf node_modules && npm install && npm run build"
  publish = "dist"

# SPA fallback: serve index.html for client-side routes.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
